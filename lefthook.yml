pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "protoc-generator/*.ts"
      run: bunx eslint {staged_files}
    types:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "protoc-generator/*.ts"
      run: bun run typecheck
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: bunx commitlint --edit
