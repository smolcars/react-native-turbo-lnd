procs:
  Install pods:
    shell:  pod install
    cwd: example/ios
    autostart: false
  Generate Codegen:
    shell: bun run generate-codegen-specs
    autostart: false
  Build Android:
    shell: bun run android
    cwd: example
    autostart: false
  React Native Config:
    shell: bunx react-native config
    cwd: example
    autostart: false
  Start example:
    shell: bun run start
    cwd: example
  Build server: xcode-build-server
