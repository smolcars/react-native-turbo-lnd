name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler

      - name: Prepare generated sources
        run: |
          bun run generate-bindings
          bun run generate-codegen-specs

      - name: Lint files
        run: bun run lint

      - name: Typecheck files
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

      - name: Build package
        run: bun run build
