name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate in Nix shell
        shell: bash
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            bun install --frozen-lockfile
            bun run generate-bindings
            bun run generate-codegen-specs
            bun run lint
            bun run typecheck
            bun run test
            bun run build
          '
