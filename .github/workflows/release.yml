name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver increment to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Run the full release flow without publishing or uploading assets
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LND_REPOSITORY: hsjoberg/lnd
  LND_REF: 6fc085be1a4d434758b8f2f99bec21f00d167471

jobs:
  validate:
    runs-on: ubuntu-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release candidate
        shell: bash
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            bun install --frozen-lockfile --ignore-scripts
            bun run generate-bindings
            bun run generate-codegen-specs
            bun run lint
            bun run typecheck
            bun run test
            bun run build
          '

  native-artifacts:
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            runner: ubuntu-self-hosted
            asset_name: liblnd-android.zip
          - target: ios
            runner: macOS
            asset_name: liblnd-ios.zip
          - target: macos
            runner: macOS
            asset_name: liblnd-macos.zip
          - target: macos-shared
            runner: macOS
            asset_name: liblnd-macos-dylib.zip
          - target: linux
            runner: ubuntu-self-hosted
            asset_name: liblnd-linux.zip
          - target: windows
            runner: ubuntu-self-hosted
            asset_name: liblnd-windows.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout pinned lnd CGO fork
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LND_REPOSITORY }}
          ref: ${{ env.LND_REF }}
          path: .cache/lnd-cgo

      - name: Build native artifact
        shell: bash
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            build_root="${GITHUB_WORKSPACE}/.cache/lnd-cgo"

            case "${{ matrix.target }}" in
              ios|macos|macos-shared)
                short_root="/tmp/lnd-cgo-${{ matrix.target }}"
                rm -rf "$short_root"
                cp -R "${GITHUB_WORKSPACE}/.cache/lnd-cgo" "$short_root"
                build_root="$short_root"
                ;;
            esac

            cd "$build_root/lnrpc"
            bash ./install_gen_tools.sh

            mkdir -p "${GITHUB_WORKSPACE}/dist"
            cd "$build_root"

            case "${{ matrix.target }}" in
              android)
                make android-cgo MOBILE_RPC_MODE=local
                artifact_root="$build_root/mobile/build/cgo/android"
                asset_name="liblnd-android.zip"
                ;;
              ios)
                make ios-cgo MOBILE_RPC_MODE=local
                artifact_root="$build_root/mobile/build/cgo/ios"
                asset_name="liblnd-ios.zip"
                ;;
              macos)
                make macos-cgo MOBILE_RPC_MODE=local
                artifact_root="$build_root/mobile/build/cgo/macos"
                asset_name="liblnd-macos.zip"
                ;;
              macos-shared)
                make macos-cgo-shared MOBILE_RPC_MODE=local
                artifact_root="$build_root/mobile/build/cgo/macos"
                asset_name="liblnd-macos-dylib.zip"
                ;;
              linux)
                make linux-cgo MOBILE_RPC_MODE=local
                artifact_root="$build_root/mobile/build/cgo/linux"
                asset_name="liblnd-linux.zip"
                ;;
              windows)
                make windows-cgo MOBILE_RPC_MODE=local WINDOWS_CGO_CC=x86_64-w64-mingw32-gcc
                artifact_root="$build_root/mobile/build/cgo/windows"
                asset_name="liblnd-windows.zip"
                ;;
              *)
                echo "Unsupported target ${{ matrix.target }}" >&2
                exit 1
                ;;
            esac

            cd "${artifact_root}"
            zip -rq "${GITHUB_WORKSPACE}/dist/${asset_name}" .
          '

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  build-android:
    needs: native-artifacts
    runs-on: ubuntu-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-android
          path: ${{ runner.temp }}/native-android

      - name: Build Android example in Nix shell
        shell: bash
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            bun install --frozen-lockfile --ignore-scripts
            bun run generate-bindings
            bun run generate-codegen-specs

            rm -rf android/src/main/jniLibs
            mkdir -p android/src/main/jniLibs
            unzip -q "${RUNNER_TEMP}/native-android/liblnd-android.zip" -d android/src/main/jniLibs

            bun run --cwd example build:android
          '

  build-ios:
    needs: native-artifacts
    runs-on: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-ios
          path: ${{ runner.temp }}/native-ios

      - name: Build iOS example in Nix shell
        shell: bash
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            bun install --frozen-lockfile --ignore-scripts
            bun run generate-bindings
            bun run generate-codegen-specs

            rm -rf ios/Lndmobile.xcframework
            unzip -q "${RUNNER_TEMP}/native-ios/liblnd-ios.zip" -d "${RUNNER_TEMP}/native-ios/unpacked"
            mv "${RUNNER_TEMP}/native-ios/unpacked/Lndmobile.xcframework" ios/Lndmobile.xcframework

            cd example/ios
            pod install

            /usr/bin/xcodebuild \
              -workspace TurboLndExample.xcworkspace \
              -scheme TurboLndExample \
              -configuration Debug \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              CC=/usr/bin/clang \
              CPLUSPLUS=/usr/bin/clang++ \
              LD=/usr/bin/clang \
              LDPLUSPLUS=/usr/bin/clang++ \
              GCC_OPTIMIZATION_LEVEL=0 \
              GCC_PRECOMPILE_PREFIX_HEADER=YES \
              ASSETCATALOG_COMPILER_OPTIMIZATION=time \
              DEBUG_INFORMATION_FORMAT=dwarf \
              COMPILER_INDEX_STORE_ENABLE=NO
          '

